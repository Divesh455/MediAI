<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MediAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-darker-custom sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="fas fa-heartbeat text-primary me-2"></i>MediAI
            </a>
            <button class="navbar-toggler" type="button" id="sidebarToggle">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="ms-auto">
                <div class="dropdown">
                    <button class="btn btn-link text-decoration-none text-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle fa-2x"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li><a class="dropdown-item" href="profile.html">Profile</a></li>
                        <li><a class="dropdown-item" href="settings.html">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="index.html">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="container-fluid">
        <div class="row g-0">
            <nav class="sidebar col-12 col-md-3 col-lg-2 p-3" id="sidebar">
                <div class="nav flex-column">
                    <a class="nav-link" href="dashboard.html">
                        <i class="fas fa-chart-line me-2"></i>Dashboard
                    </a>
                    <a class="nav-link" href="predict.html">
                        <i class="fas fa-brain me-2"></i>Disease Prediction
                    </a>
                    <a class="nav-link" href="xray.html">
                        <i class="fas fa-images me-2"></i>X-Ray Analysis
                    </a>
                    <a class="nav-link" href="chatbot.html">
                        <i class="fas fa-comments me-2"></i>Health Chatbot
                    </a>
                    <a class="nav-link" href="reports.html">
                        <i class="fas fa-file-medical me-2"></i>Reports
                    </a>
                    <a class="nav-link" href="history.html">
                        <i class="fas fa-history me-2"></i>History
                    </a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-12 col-md-9 col-lg-10 p-4">
                <div class="mb-4">
                    <h1 class="display-5 fw-bold mb-2">
                        <i class="fas fa-user text-primary me-2"></i>My Profile
                    </h1>
                    <p class="text-light-secondary">Manage your personal information</p>
                </div>

                <div class="row g-4">
                    <!-- Profile Picture & Basic Info -->
                    <div class="col-lg-4">
                        <div class="chart-container text-center">
                            <div class="mb-4">
                                <div class="position-relative d-inline-block">
                                    <img src="https://via.placeholder.com/120" alt="Profile" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover;">
                                    <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle">
                                        <i class="fas fa-camera"></i>
                                    </button>
                                </div>
                            </div>
                            <h4 class="mb-1">John Doe</h4>
                            <p class="text-light-secondary mb-4">john.doe@email.com</p>
                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-primary">Edit Profile</button>
                            </div>
                        </div>
                    </div>

                    <!-- Profile Details -->
                    <div class="col-lg-8">
                        <div class="chart-container">
                            <h5 class="mb-4">Personal Information</h5>
                            <form>
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="firstName" class="form-label">First Name</label>
                                        <input type="text" class="form-control" value="John" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="lastName" class="form-label">Last Name</label>
                                        <input type="text" class="form-control" value="Doe" disabled>
                                    </div>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" value="john.doe@email.com" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="phone" class="form-label">Phone</label>
                                        <input type="tel" class="form-control" value="+1 (555) 123-4567" disabled>
                                    </div>
                                </div>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="dob" class="form-label">Date of Birth</label>
                                        <input type="date" class="form-control" value="1990-01-15" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="gender" class="form-label">Gender</label>
                                        <select class="form-select" disabled>
                                            <option selected>Male</option>
                                            <option>Female</option>
                                            <option>Other</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="address" class="form-label">Address</label>
                                    <input type="text" class="form-control" value="123 Main Street" disabled>
                                </div>

                                <hr class="my-4 border-secondary">
                                <h5 class="mb-4">Health Information</h5>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label for="height" class="form-label">Height (cm)</label>
                                        <input type="number" class="form-control" value="180" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="weight" class="form-label">Weight (kg)</label>
                                        <input type="number" class="form-control" value="75" disabled>
                                    </div>
                                </div>

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="bloodType" class="form-label">Blood Type</label>
                                        <select class="form-select" disabled>
                                            <option selected>O+</option>
                                            <option>O-</option>
                                            <option>A+</option>
                                            <option>A-</option>
                                            <option>B+</option>
                                            <option>B-</option>
                                            <option>AB+</option>
                                            <option>AB-</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="allergies" class="form-label">Allergies</label>
                                        <input type="text" class="form-control" value="None" disabled>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });
    </script>
</body>
</html>
