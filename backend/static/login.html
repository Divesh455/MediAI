<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <div class="auth-container">
        <div class="auth-card glass-effect p-5">
            <div class="auth-header">
                <a href="/" class="text-decoration-none">
                    <i class="fas fa-heartbeat text-primary me-2"></i>
                    <span class="text-primary fw-bold fs-5">MediAI</span>
                </a>
                <h2 class="mt-4 mb-2">Welcome Back</h2>
                <p class="text-light-secondary">Login to your MediAI account</p>
            </div>

            <div id="alertContainer" class="mb-3 d-none">
                <div class="alert alert-danger py-2 px-3 small mb-0" id="alertMessage"></div>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Login</button>
            </form>

            <div class="text-center">
                <p class="text-light-secondary mb-0">Don't have an account? 
                    <a href="/register" class="text-decoration-none text-primary fw-bold">Sign up here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertContainer = document.getElementById('alertContainer');
            const alertMessage = document.getElementById('alertMessage');
            if (alertContainer) alertContainer.classList.add('d-none');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const submitButton = document.querySelector('#loginForm button[type="submit"]');
            submitButton.disabled = true;

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.detail || 'Login failed.');
                }
                localStorage.setItem('token', result.token || '');
                localStorage.setItem('user_id', String(result.user?.id || ''));
                window.location.href = '/dashboard';
            } catch (error) {
                if (alertContainer && alertMessage) {
                    alertMessage.textContent = error.message || 'Login failed.';
                    alertContainer.classList.remove('d-none');
                } else {
                    alert(error.message || 'Login failed.');
                }
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
