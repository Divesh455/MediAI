<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MediAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <div class="auth-container">
        <div class="auth-card glass-effect p-5">
            <div class="auth-header">
                <a href="/" class="text-decoration-none">
                    <i class="fas fa-heartbeat text-primary me-2"></i>
                    <span class="text-primary fw-bold fs-5">MediAI</span>
                </a>
                <h2 class="mt-4 mb-2">Create Account</h2>
                <p class="text-light-secondary">Join thousands of users in their healthcare journey</p>
            </div>

            <div id="alertContainer" class="mb-3 d-none">
                <div class="alert alert-danger py-2 px-3 small mb-0" id="alertMessage"></div>
            </div>

            <form id="registerForm">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" name="firstName" placeholder="John" required>
                    </div>
                    <div class="col-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create a strong password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="text-light-secondary d-block mt-2">
                        Must be at least 8 characters with uppercase, lowercase, and numbers
                    </small>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and 
                        <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Create Account</button>
            </form>

            <div class="text-center">
                <p class="text-light-secondary mb-0">Already have an account? 
                    <a href="/login" class="text-decoration-none text-primary fw-bold">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Password toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Form validation and submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const alertContainer = document.getElementById('alertContainer');
            const alertMessage = document.getElementById('alertMessage');
            if (alertContainer) alertContainer.classList.add('d-none');

            function showError(msg) {
                if (alertContainer && alertMessage) {
                    alertMessage.textContent = msg;
                    alertContainer.classList.remove('d-none');
                } else {
                    alert(msg);
                }
            }
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showError('Passwords do not match!');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters long.');
                return;
            }

            if (!/[A-Z]/.test(password)) {
                showError('Password must include an uppercase letter.');
                return;
            }

            if (!/[a-z]/.test(password)) {
                showError('Password must include a lowercase letter.');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showError('Password must include a number.');
                return;
            }

            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: password
            };

            const submitButton = document.querySelector('#registerForm button[type="submit"]');
            submitButton.disabled = true;

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                });
                const result = await response.json();
                if (!response.ok) {
                    const message = Array.isArray(result.detail)
                        ? result.detail.map(item => item.msg).join('\n')
                        : result.detail || 'Registration failed.';
                    throw new Error(message);
                }
                localStorage.setItem('token', result.token || '');
                localStorage.setItem('user_id', String(result.user?.id || ''));
                window.location.href = '/dashboard';
            } catch (error) {
                showError(error.message || 'Registration failed.');
            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
