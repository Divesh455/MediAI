<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - MediAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-darker-custom sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="fas fa-heartbeat text-primary me-2"></i>MediAI
            </a>
            <button class="navbar-toggler" type="button" id="sidebarToggle">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="ms-auto">
                <div class="dropdown">
                    <button class="btn btn-link text-decoration-none text-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle fa-2x"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li><a class="dropdown-item" href="/profile">Profile</a></li>
                        <li><a class="dropdown-item" href="/settings">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/">Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="container-fluid">
        <div class="row g-0">
            <nav class="sidebar col-12 col-md-3 col-lg-2 p-3" id="sidebar">
                <div class="nav flex-column">
                    <a class="nav-link" href="/dashboard">
                        <i class="fas fa-chart-line me-2"></i>Dashboard
                    </a>
                    <a class="nav-link" href="/predict">
                        <i class="fas fa-brain me-2"></i>Disease Prediction
                    </a>
                    <a class="nav-link" href="/xray">
                        <i class="fas fa-images me-2"></i>X-Ray Analysis
                    </a>
                    <a class="nav-link" href="/chatbot">
                        <i class="fas fa-comments me-2"></i>Health Chatbot
                    </a>
                    <a class="nav-link" href="/reports">
                        <i class="fas fa-file-medical me-2"></i>Reports
                    </a>
                    <a class="nav-link active" href="/history">
                        <i class="fas fa-history me-2"></i>History
                    </a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-12 col-md-9 col-lg-10 p-4">
                <div class="mb-4">
                    <h1 class="display-5 fw-bold mb-2">
                        <i class="fas fa-history text-primary me-2"></i>Activity History
                    </h1>
                    <p class="text-light-secondary">Track all your health activities and analyses</p>
                </div>

                <!-- Timeline -->
                <div class="chart-container">
                    <div class="timeline" id="historyTimeline">
                        <p class="text-light-secondary mb-0">Loading your activity...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('show');
        });

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        async function loadHistory() {
            const timeline = document.getElementById('historyTimeline');
            try {
                const response = await fetch('/activity/history');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                const data = await response.json();
                if (!data.items.length) {
                    timeline.innerHTML = '<p class="text-light-secondary mb-0">No activity yet. Use the chatbot or disease prediction to create history.</p>';
                    return;
                }

                timeline.innerHTML = `
                    <div class="timeline-item">
                        <div class="timeline-date text-primary fw-bold mb-3">Recent Activity</div>
                        ${data.items.map(item => `
                            <div class="timeline-entry mb-3">
                                <div class="timeline-dot"></div>
                                <div class="timeline-content">
                                    <p class="fw-bold mb-1">${escapeHtml(item.title)}</p>
                                    <p class="text-light-secondary small mb-2">${escapeHtml(item.description)}</p>
                                    <small class="text-light-secondary">${escapeHtml(item.display_time)}</small>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('[history] Failed to load history:', error);
                timeline.innerHTML = '<p class="text-light-secondary mb-0">Could not load activity history.</p>';
            }
        }

        loadHistory();
    </script>
</body>
</html>
